version: "3.9"

services:
  # ─── Backend (Node.js / Express) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: briefrabbit-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - briefrabbit-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ─── Frontend (React + Vite) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: briefrabbit-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - briefrabbit-net
    restart: unless-stopped

networks:
  briefrabbit-net:
    driver: bridge
