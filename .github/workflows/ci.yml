name: BriefRabbit CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend CI ───
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test
        env:
          API_KEY: dev-api-key-change-me
          LLM_PROVIDER: groq
          GROQ_API_KEY: test-key
          EMAIL_PROVIDER: smtp
          NODE_ENV: test

  # ─── Frontend CI ───
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.briefrabbit.com

  # ─── Docker Build Validation ───
  docker:
    name: Docker — Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t briefrabbit-backend:ci ./backend

      - name: Verify image starts
        run: |
          docker run -d --name test-backend -p 8000:8000 \
            -e API_KEY=test-key \
            -e LLM_PROVIDER=groq \
            -e GROQ_API_KEY=test-key \
            -e EMAIL_PROVIDER=smtp \
            briefrabbit-backend:ci
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-backend
